{% extends "base.html" %}
{% block title %}Apps{% endblock %}
{% block content %}
<h2 class="mb-3">Apps — {{ team.name if team else 'No team' }}</h2>

<table class="table table-bordered table-hover align-middle">
  <thead class="table-dark">
    <tr>
      <th>Sort Order</th>
      <th>Name</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for a in apps %}
    <tr>
      <td>
        <form method="post" action="{{ url_for('admin.apps_reorder', app_id=a.id) }}" class="d-flex gap-1">
          <input type="number" name="sort_order" value="{{ a.sort_order }}"
                 class="form-control form-control-sm" style="width:70px">
          <button class="btn btn-sm btn-outline-secondary">Set</button>
        </form>
      </td>
      <td>{{ a.name }}</td>
      <td>
        <form method="post" action="{{ url_for('admin.apps_delete', app_id=a.id) }}" class="d-inline">
          <button class="btn btn-sm btn-outline-danger"
                  onclick="return confirm('Delete {{ a.name }}?')">Delete</button>
        </form>
      </td>
    </tr>
    {% else %}
    <tr><td colspan="3" class="text-center text-muted">No apps.</td></tr>
    {% endfor %}
  </tbody>
</table>

<h5 class="mt-4">Add App</h5>
<form method="post" action="{{ url_for('admin.apps_add') }}" class="row g-2">
  <div class="col-md-4">
    <input type="text" name="name" class="form-control" placeholder="App name" required>
  </div>
  <div class="col-auto">
    <button type="submit" class="btn btn-primary">Add</button>
  </div>
</form>
{% endblock %}
