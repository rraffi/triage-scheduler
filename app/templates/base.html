<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Triage Scheduler{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  {% if session.get('is_admin') %}
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('admin.schedule') }}">Triage Scheduler</a>
      <div class="navbar-nav">
        <a class="nav-link {% if request.endpoint == 'admin.schedule' %}active{% endif %}"
           href="{{ url_for('admin.schedule') }}">Schedule</a>
        <a class="nav-link {% if request.endpoint == 'admin.availability' %}active{% endif %}"
           href="{{ url_for('admin.availability') }}">Availability</a>
        <a class="nav-link {% if request.endpoint == 'admin.roster' %}active{% endif %}"
           href="{{ url_for('admin.roster') }}">Roster</a>
        <a class="nav-link {% if request.endpoint == 'admin.apps' %}active{% endif %}"
           href="{{ url_for('admin.apps') }}">Apps</a>
        <a class="nav-link text-danger" href="{{ url_for('admin.logout') }}">Logout</a>
      </div>
    </div>
  </nav>
  {% endif %}

  <div class="container">
    {% for cat, msg in get_flashed_messages(with_categories=true) %}
    <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
      {{ msg }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}

    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
